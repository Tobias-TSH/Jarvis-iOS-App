name: Build Jarvis iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Xcode version
        run: xcodebuild -version

      - name: Build Archive
        run: |
          xcodebuild \
            -project src/ios/Jarvis/Jarvis.xcodeproj \
            -scheme Jarvis \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/Jarvis.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/Jarvis.xcarchive/Products/Applications/Jarvis.app build/ipa/Payload/
          cd build/ipa
          zip -r ../../Jarvis.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-iOS-App
          path: Jarvis.ipa
          retention-days: 7
