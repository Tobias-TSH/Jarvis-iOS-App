name: Build Jarvis iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build Archive (no signing)
      run: |
        xcodebuild \
          -project src/ios/Jarvis/Jarvis.xcodeproj \
          -scheme Jarvis \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath $RUNNER_TEMP/Jarvis.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          | xcpretty || true

    - name: Package IPA (unsigned)
      run: |
        mkdir -p $RUNNER_TEMP/ipa/Payload
        cp -r "$RUNNER_TEMP/Jarvis.xcarchive/Products/Applications/Jarvis.app" \
              "$RUNNER_TEMP/ipa/Payload/Jarvis.app"
        cd $RUNNER_TEMP/ipa
        zip -r ../Jarvis.ipa Payload
        echo "IPA created successfully"

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Jarvis-iOS-App
        path: ${{ runner.temp }}/Jarvis.ipa
        retention-days: 7
