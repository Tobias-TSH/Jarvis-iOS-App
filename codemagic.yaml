workflows:
  ios-build:
    name: Jarvis iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default

    scripts:
      - name: Build unsigned IPA
        script: |
          xcodebuild \
            -project src/ios/Jarvis/Jarvis.xcodeproj \
            -scheme Jarvis \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $CM_BUILD_DIR/Jarvis.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        script: |
          mkdir -p $CM_BUILD_DIR/ipa/Payload
          cp -r "$CM_BUILD_DIR/Jarvis.xcarchive/Products/Applications/Jarvis.app" \
                "$CM_BUILD_DIR/ipa/Payload/"
          cd $CM_BUILD_DIR/ipa
          zip -r $CM_BUILD_DIR/Jarvis.ipa Payload/

    artifacts:
      - $CM_BUILD_DIR/Jarvis.ipa
